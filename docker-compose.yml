services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: snug_db
      POSTGRES_USER: snug_user
      POSTGRES_PASSWORD: snug_password
    ports:
      - "5432:5432"
    volumes:
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snug_user -d snug_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/snug_db
      SPRING_DATASOURCE_USERNAME: snug_user
      SPRING_DATASOURCE_PASSWORD: snug_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy